services:
  poseidon:
    build:
      context: .
      dockerfile: Dockerfile
    image: poseidon:local
    container_name: poseidon
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:80"
    volumes:
      - ./screenshots:/app/data/screenshots
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1/api/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
