<div class="flex flex-col lg:flex-row gap-6">
	<div class="lg:w-64 flex-shrink-0 flex flex-col gap-2">
		<div class="text-[10px] text-slate-500 uppercase tracking-widest font-black mb-2 pl-2">Exploration Categories</div>

		@for (category of categories; track category.id) {
			<div
					(click)="selectCategory(category)"
					class="px-4 py-3 rounded-xl border cursor-pointer transition-all flex items-center gap-3 backdrop-blur-md"
					[ngClass]="activeCategory()?.id === category.id
                            ? 'bg-purple-500/10 border-purple-500/30 text-purple-400 shadow-[0_0_15px_rgba(168,85,247,0.15)]'
                            : 'bg-black/20 border-white/5 text-slate-400 hover:bg-white/5 hover:text-slate-200'">
				<i class="fa {{ category.icon }} w-4 text-center"></i>
				<span class="font-bold text-sm">{{ category.label }}</span>
			</div>
		}

		<div class="mt-8 px-4 py-3 rounded-xl border border-white/5 bg-black/20">
			<div class="text-[10px] text-slate-500 uppercase tracking-widest font-bold flex items-center gap-2 mb-2">
				<span class="w-3 h-3 rounded-full bg-emerald-500/20 border border-emerald-500 block"></span> Win Rate
			</div>
			<div class="text-[10px] text-slate-500 uppercase tracking-widest font-bold flex items-center gap-2">
				<span class="w-3 h-3 bg-slate-700 block"></span> Trade Volume
			</div>
		</div>
	</div>

	<div class="flex-grow">
		@if (activeCharts().length === 0) {
			<div class="p-8 text-center text-slate-500 font-bold border border-dashed border-white/10 rounded-2xl">
				No data available for this category
			</div>
		} @else {
			<div class="grid grid-cols-1 xl:grid-cols-2 gap-6">
				@for (config of activeCharts(); track config.metricLabel) {
					<div class="p-4 rounded-2xl bg-black/20 border border-white/5 backdrop-blur-2xl shadow-xl flex flex-col">
						<div class="text-sm font-black text-slate-200 mb-2 pl-1">{{ config.metricLabel }}</div>
						<div class="flex-grow">
							<apx-chart
									[series]="config.series" [chart]="config.chart" [xaxis]="config.xaxis"
									[yaxis]="config.yaxis" [grid]="mixedGrid" [legend]="mixedLegend"
									[tooltip]="mixedTooltip" [stroke]="mixedStroke" [fill]="mixedFill"
									[colors]="mixedColors" [dataLabels]="mixedDataLabels" [markers]="mixedMarkers"
									style="width: 100%; min-height: 250px;"
							></apx-chart>
						</div>
					</div>
				}
			</div>
		}
	</div>
</div>
