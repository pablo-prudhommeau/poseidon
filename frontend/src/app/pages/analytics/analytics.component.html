<div class="space-y-5">
    @if (isLoading()) {
        <div class="analytics-loading">
            <div class="analytics-loading-spinner"></div>
            Loading analytics data...
        </div>
    } @else if (loadingError()) {
        <div class="analytics-error">
            <i class="pi pi-exclamation-triangle" style="margin-right: 8px;"></i>
            {{ loadingError() }}
        </div>
    } @else if (aggregatedData(); as data) {
        <app-analytics-kpi-bar [kpis]="data.kpis" [timeline]="data.timeline"></app-analytics-kpi-bar>

        <p-tabs [value]="activeTabValue()" (valueChange)="onTabChange($event)">
            <p-tablist>
                <p-tab value="0">Synthesis</p-tab>
                <p-tab value="1">Exploration</p-tab>
            </p-tablist>
            <p-tabpanels>
                <p-tabpanel value="0">
                    <app-analytics-synthesis
                        [pnlDriversSeries]="data.pnl_drivers_series"
                        [scatterData]="data.scatter_series"
                    ></app-analytics-synthesis>
                </p-tabpanel>
                <p-tabpanel value="1">
                    <app-analytics-exploration
                        [heatmapData]="data.pnl_drivers_series"
                        [isActive]="activeTabValue() === '1'"
                    ></app-analytics-exploration>
                </p-tabpanel>
            </p-tabpanels>
        </p-tabs>
    }
</div>
