@if (isPaperTradingModeActive() && !isApplicationInitialLoading()) {
    <div class="group inline-flex items-center rounded-full ring-1 ring-yellow-400/30 bg-yellow-500/15 text-yellow-300 backdrop-blur shadow-sm overflow-hidden select-none">
        <div class="flex items-center gap-2 pl-3 pr-1 py-1 text-sm font-semibold uppercase tracking-wide">
            <i class="fa-solid fa-flask opacity-90"></i>
            <span class="text-sm/6"> Paper Mode </span>
        </div>
        <button type="button" [disabled]="isPortfolioResetInProgress()" (click)="resetPaperPortfolioToInitialState()" class="h-7 w-7 ml-2 my-0.5 inline-grid place-content-center rounded-full ring-1 ring-yellow-300/40 bg-yellow-400/10 transition hover:bg-yellow-400/20 active:scale-95 disabled:opacity-50 cursor-pointer" aria-label="Reset paper portfolio to initial balance">
            @if (!isPortfolioResetInProgress()) {
                <i class="fa-solid fa-arrow-rotate-left text-xs"></i>
            } @else {
                <i class="fa-solid fa-circle-notch text-xs animate-spin"></i>
            }
        </button>
    </div>
}
