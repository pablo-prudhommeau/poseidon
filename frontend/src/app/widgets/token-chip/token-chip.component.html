<span class="inline-flex items-center gap-2">
    <img [src]="blockchainIconUrl" (error)="handleBlockchainImageError()" alt="Blockchain icon" class="h-4 w-4 rounded-full ring-1 ring-white/10" />
    @if (isTokenImageVisible && tokenIconCandidates.length > 0) {
        <img [src]="tokenIconCandidates[currentTokenIconIndex]" (error)="handleTokenImageError()" alt="Token icon" class="h-4 w-4 rounded-full ring-1 ring-white/10" />
    }
    <span class="font-medium">
        {{ symbol }}
    </span>
</span>
